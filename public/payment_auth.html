<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - De Las Armas</title>
    <link rel="icon" href="assets/img/de las armasa logo 3.png">
    <link rel="stylesheet" href="assets/css/payment.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="checkout-header">
        <div class="header-container">
            <div class="header-left">
                <img src="assets/img/de las armasa logo 3 (1).png" alt="Logo" class="header-logo">
                <h1>DE LAS ARMAS <span style="font-size: 16px; font-style: italic; font-weight: normal;">Catering</span></h1>
            </div>
            <div class="header-right">
                <nav>
                    <a href="home.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="packages_list.html">Packages</a>
                    <a href="contact.html">Contact Us</a>
                </nav>
                <div class="brand-text">
                    <h4>DE LAS ARMAS</h4>
                    <p>Catering & Event Services</p>
                </div>
            </div>
        </div>
    </header>

    <main class="payment-main">
        
        <h1 class="gcash-title">GCash</h1>

        <div class="payment-card">
            <div class="card-body">
                
                <p class="auth-message" id="authMessage">
                    We sent an authentication code to your<br>
                    number <span id="maskedNumber">***********</span>
                </p>

                <h2 class="auth-title">Enter Authentication Code</h2>

                <form id="otpForm" class="payment-form">
                    
                    <div class="otp-container">
                        <input type="text" maxlength="1" class="otp-input" id="otp1" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-input" id="otp2" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-input" id="otp3" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-input" id="otp4" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-input" id="otp5" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-input" id="otp6" inputmode="numeric">
                    </div>

                    <div id="otpError" style="color: #e74c3c; display: none; margin-bottom: 10px; text-align: center;"></div>
                    <div id="otpSuccess" style="color: #2ecc71; display: none; margin-bottom: 10px; text-align: center;"></div>

                    <button type="submit" class="btn-next btn-submit" id="submitOTPBtn">SUBMIT CODE</button>

                    <p class="resend-text">
                        Didn't get the code? <a href="#" id="resendCode" class="resend-link">Resend Code</a>
                    </p>
                    <p id="timerText" style="font-size: 12px; color: #666; margin-top: 5px;"></p>
                </form>
            </div>
        </div>

    </main>

    <footer class="page-footer">
        <div class="footer-brand">
            <h4>DE LAS ARMAS</h4>
            <p>Catering & Event Services</p>
        </div>
        <div class="footer-links">
            <div class="v-line"></div>
            <a href="#">Terms</a>
            <a href="#">Privacy</a>
        </div>
    </footer>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Get stored data
        const mobileNumber = sessionStorage.getItem('gcashMobile') || '9123456789';
        const storedOTP = sessionStorage.getItem('gcashOTP');
        
        // Mask the mobile number
        const maskedNumber = mobileNumber.replace(/(\d{3})(\d{3})(\d{4})/, '$1***$3');
        document.getElementById('maskedNumber').textContent = maskedNumber;
        
        // OTP input handling
        const otpInputs = document.querySelectorAll('.otp-input');
        let timerInterval;
        let timeLeft = 60; // 60 seconds resend timer
        
        // Auto-focus OTP inputs
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', function(e) {
                this.value = this.value.replace(/[^0-9]/g, '');
                
                if (this.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });
            
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && index > 0 && this.value.length === 0) {
                    otpInputs[index - 1].focus();
                }
            });
            
            input.addEventListener('paste', function(e) {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text').replace(/[^0-9]/g, '');
                
                for (let i = 0; i < Math.min(pasteData.length, otpInputs.length); i++) {
                    otpInputs[i].value = pasteData[i];
                }
                
                if (pasteData.length >= otpInputs.length) {
                    otpInputs[otpInputs.length - 1].focus();
                } else {
                    otpInputs[pasteData.length].focus();
                }
            });
        });
        
        // Start resend timer
        startResendTimer();
        
        function startResendTimer() {
            const resendLink = document.getElementById('resendCode');
            const timerText = document.getElementById('timerText');
            timeLeft = 60;
            
            resendLink.style.pointerEvents = 'none';
            resendLink.style.opacity = '0.5';
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerText.textContent = `Resend available in ${timeLeft} seconds`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    resendLink.style.pointerEvents = 'auto';
                    resendLink.style.opacity = '1';
                    timerText.textContent = '';
                }
            }, 1000);
        }
        
        // Resend code
        document.getElementById('resendCode').addEventListener('click', function(e) {
            e.preventDefault();
            
            // Generate new OTP
            const newOTP = Math.floor(100000 + Math.random() * 900000).toString();
            sessionStorage.setItem('gcashOTP', newOTP);
            
            // Reset timer
            clearInterval(timerInterval);
            startResendTimer();
            
            // Show simulation alert
            alert(`[SIMULATION MODE]\n\nNew OTP sent: ${newOTP}`);
            
            // Clear OTP inputs
            otpInputs.forEach(input => input.value = '');
            otpInputs[0].focus();
        });
        
        // Handle form submission
        document.getElementById('otpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const enteredOTP = Array.from(otpInputs).map(input => input.value).join('');
            const errorDiv = document.getElementById('otpError');
            const successDiv = document.getElementById('otpSuccess');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (enteredOTP.length !== 6) {
                errorDiv.textContent = 'Please enter complete 6-digit code';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Verify OTP
            if (enteredOTP === storedOTP) {
                successDiv.textContent = 'Code verified successfully! Redirecting...';
                successDiv.style.display = 'block';
                
                // Disable button
                document.getElementById('submitOTPBtn').disabled = true;
                
                // Redirect to MPIN page after short delay
                setTimeout(() => {
                    window.location.href = 'payment_mpin.html';
                }, 1500);
            } else {
                errorDiv.textContent = 'Invalid authentication code. Please try again.';
                errorDiv.style.display = 'block';
                
                // Clear inputs on error
                otpInputs.forEach(input => input.value = '');
                otpInputs[0].focus();
            }
        });
    });
    </script>
</body>
</html>
