<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - De Las Armas</title>
    <link rel="icon" href="assets/img/de las armasa logo 3.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy:    #19276F;
            --navy-dk: #111b52;
            --cream:   #f5f5eb;
            --gold:    #c9a84c;
            --white:   #ffffff;
            --err:     #e74c3c;
            --ok:      #2ecc71;
            --input-bg: #19276F;
            --input-text: #ffffff;
            --label:   #19276F;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--cream);
            color: #222;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .checkout-header {
            background: var(--navy);
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
        }
        .header-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .header-logo {
            height: 44px; width: 44px; object-fit: contain;
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
        }
        .header-left h1 {
            color: #fff; font-family: 'Cormorant Garamond', serif;
            font-size: 20px; font-weight: 700; letter-spacing: 1px;
        }
        .header-right { display: flex; align-items: center; gap: 36px; }
        .header-right nav { display: flex; gap: 28px; }
        .header-right nav a {
            color: rgba(255,255,255,0.8); text-decoration: none;
            font-size: 13px; font-weight: 400; letter-spacing: 0.5px; transition: color 0.2s;
        }
        .header-right nav a:hover { color: #fff; }
        .brand-text { text-align: right; }
        .brand-text h4 {
            color: #fff; font-family: 'Cormorant Garamond', serif;
            font-size: 14px; font-weight: 700; letter-spacing: 1.5px; line-height: 1.2;
        }
        .brand-text p { color: rgba(255,255,255,0.6); font-size: 10px; letter-spacing: 0.5px; }

        .checkout-main {
            flex: 1; display: flex; align-items: flex-start;
            justify-content: center; padding: 40px 20px 60px;
        }
        .form-wrapper { width: 100%; max-width: 1060px; }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px; font-weight: 700; color: var(--navy);
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px;
        }
        .page-subtitle {
            font-size: 13px; color: #666; font-style: italic;
            margin-bottom: 28px; font-family: 'Jost', sans-serif;
        }

        .form-card {
            background: #fff; border-radius: 12px;
            border: 1px solid rgba(25,39,111,0.12);
            padding: 40px 44px;
            box-shadow: 0 4px 30px rgba(25,39,111,0.07);
        }

        .sections-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0 60px;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px; font-weight: 600; color: var(--gold);
            letter-spacing: 1px; margin-bottom: 22px; padding-bottom: 8px;
            border-bottom: 1px solid rgba(201,168,76,0.3);
        }

        .field-group { margin-bottom: 18px; }
        .field-group label {
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; font-weight: 500;
            color: var(--label); letter-spacing: 0.6px;
            text-transform: uppercase; margin-bottom: 7px;
        }

        /* ── Prefilled badge ──────────────────────────────── */
        .prefill-badge {
            display: inline-flex; align-items: center; gap: 4px;
            background: rgba(46, 204, 113, 0.15);
            color: #1a9a50;
            border: 1px solid rgba(46, 204, 113, 0.35);
            border-radius: 20px;
            font-size: 10px; font-weight: 600;
            padding: 1px 8px; letter-spacing: 0.3px;
            text-transform: none;
        }
        .prefill-badge i { font-size: 9px; }

        /* ── Prefilled input style ────────────────────────── */
        .field-group input.prefilled {
            background: #1a3a60 !important;
            box-shadow: 0 0 0 2px rgba(46, 204, 113, 0.5) !important;
            color: #fff !important;
        }

        .field-group input,
        .field-group textarea,
        .field-group select {
            width: 100%; background: var(--input-bg); color: var(--input-text);
            border: none; border-radius: 50px; padding: 13px 22px;
            font-size: 14px; font-family: 'Jost', sans-serif;
            outline: none; transition: background 0.2s, box-shadow 0.2s;
        }
        .field-group input::placeholder,
        .field-group textarea::placeholder {
            color: rgba(255,255,255,0.45); font-style: italic;
        }
        .field-group input:focus,
        .field-group textarea:focus {
            background: var(--navy-dk); box-shadow: 0 0 0 3px rgba(201,168,76,0.35);
        }
        .field-group input.valid   { box-shadow: 0 0 0 2px var(--ok);  background: #1a3060; }
        .field-group input.invalid { box-shadow: 0 0 0 2px var(--err); background: #1a3060; }

        /* ── Native date / time inputs ────────────────────── */
        .field-group input[type="date"],
        .field-group input[type="time"] {
            width: 100%;
            background: var(--input-bg);
            color: var(--input-text);
            border: none;
            border-radius: 50px;
            padding: 13px 22px;
            font-size: 14px;
            font-family: 'Jost', sans-serif;
            outline: none;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            /* Make the calendar/clock icon white */
            color-scheme: dark;
        }
        .field-group input[type="date"]:focus,
        .field-group input[type="time"]:focus {
            background: var(--navy-dk);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.35);
        }
        .field-group input[type="date"].valid,
        .field-group input[type="time"].valid {
            box-shadow: 0 0 0 2px var(--ok); background: #1a3060;
        }
        .field-group input[type="date"].invalid,
        .field-group input[type="time"].invalid {
            box-shadow: 0 0 0 2px var(--err); background: #1a3060;
        }

        /* ── Time range row ───────────────────────────────── */
        .time-range-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 10px;
        }
        .time-range-sep {
            color: var(--navy);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-align: center;
            padding-top: 4px;
            opacity: 0.7;
        }
        .time-sub-label {
            font-size: 11px;
            color: #888;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .phone-wrapper { position: relative; }
        .phone-wrapper input { padding-right: 44px; }
        .phone-status-icon {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            font-size: 14px; pointer-events: none; display: none;
        }
        .phone-status-icon.ok  { color: var(--ok);  display: block; }
        .phone-status-icon.err { color: var(--err); display: block; }

        .field-error {
            font-size: 11px; color: var(--err); margin-top: 5px;
            display: none; padding-left: 8px;
        }
        .field-error.show { display: block; }

        .field-group textarea {
            border-radius: 16px; resize: vertical; min-height: 120px;
            padding: 14px 22px; line-height: 1.6;
        }

        .special-request-section {
            margin-top: 30px; padding-top: 24px;
            border-top: 1px solid rgba(25,39,111,0.1);
        }

        .btn-row { display: flex; justify-content: center; margin-top: 36px; }
        .btn-continue {
            background: var(--navy); color: #fff; border: none;
            border-radius: 50px; padding: 15px 80px; font-size: 14px;
            font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
            font-family: 'Jost', sans-serif; cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 18px rgba(25,39,111,0.22);
        }
        .btn-continue:hover {
            background: var(--navy-dk); transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(25,39,111,0.3);
        }
        .btn-continue:active { transform: translateY(0); }

        .page-footer {
            background: #fff; border-top: 1px solid rgba(25,39,111,0.1);
            padding: 18px 40px; display: flex; align-items: center; gap: 20px;
        }
        .footer-brand h4 {
            font-family: 'Cormorant Garamond', serif; font-size: 13px;
            font-weight: 700; color: var(--navy); letter-spacing: 1px;
        }
        .footer-brand p { font-size: 10px; color: #999; }
        .v-line { width: 1px; height: 30px; background: rgba(25,39,111,0.2); }
        .footer-links { display: flex; align-items: center; gap: 16px; }
        .footer-links a { font-size: 12px; color: #666; text-decoration: none; }
        .footer-links a:hover { color: var(--navy); }

        @media (max-width: 768px) {
            .sections-grid { grid-template-columns: 1fr; gap: 0; }
            .form-card { padding: 28px 22px; }
            .header-right nav, .brand-text { display: none; }
            .time-range-row { grid-template-columns: 1fr; }
            .time-range-sep { display: none; }
        }
    </style>
</head>
<body>

    <header class="checkout-header">
        <div class="header-container">
            <div class="header-left">
                <img src="assets/img/de las armasa logo 3 (1).png" alt="Logo" class="header-logo">
                <h1>DE LAS ARMAS <span style="font-size:14px;font-style:italic;font-weight:400;">Catering</span></h1>
            </div>
            <div class="header-right">
                <nav>
                    <a href="home.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="packages_list.html">Packages</a>
                    <a href="contact.html">Contact Us</a>
                </nav>
                <div class="brand-text">
                    <h4>DE LAS ARMAS</h4>
                    <p>Catering & Event Services</p>
                </div>
            </div>
        </div>
    </header>

    <main class="checkout-main">
        <div class="form-wrapper">
            <h2 class="page-title">Personal Information</h2>
            <p class="page-subtitle">Please provide your details for the catering service</p>

            <div class="form-card">
                <form id="checkoutForm" novalidate>
                    <div class="sections-grid">

                        <!-- ── LEFT: Contact Info ── -->
                        <div class="contact-section">
                            <div class="section-title">Contact Information</div>

                            <div class="field-group">
                                <label for="fullName">
                                    Full Name
                                    <span class="prefill-badge" id="nameBadge" style="display:none;">
                                        <i class="fas fa-user-check"></i> Auto-filled
                                    </span>
                                </label>
                                <input type="text" id="fullName" placeholder="Juan Dela Cruz" required minlength="4">
                            </div>

                            <div class="field-group">
                                <label for="email">
                                    Email Address
                                    <span class="prefill-badge" id="emailBadge" style="display:none;">
                                        <i class="fas fa-user-check"></i> Auto-filled
                                    </span>
                                </label>
                                <input type="email" id="email" placeholder="juan@example.com" required>
                            </div>

                            <div class="field-group">
                                <label for="contact">Phone Number</label>
                                <div class="phone-wrapper">
                                    <input type="tel" id="contact"
                                           placeholder="09XXXXXXXXX"
                                           inputmode="numeric"
                                           maxlength="11"
                                           required
                                           autocomplete="tel">
                                    <span class="phone-status-icon" id="phoneIcon"></span>
                                </div>
                                <small class="field-error" id="phoneError"></small>
                            </div>

                            <div class="field-group">
                                <label for="address">Address</label>
                                <input type="text" id="address" placeholder="123 Main St. Manila" required minlength="10">
                            </div>
                        </div>

                        <!-- ── RIGHT: Event Details ── -->
                        <div class="event-section">
                            <div class="section-title">Event Details</div>

                            <!-- Native date picker -->
                            <div class="field-group">
                                <label for="eventDate">Event Date</label>
                                <input type="date" id="eventDate" required>
                                <small class="field-error" id="dateError"></small>
                            </div>

                            <!-- Start & End time in one row -->
                            <div class="field-group">
                                <label>Event Time</label>
                                <div class="time-range-row">
                                    <div>
                                        <div class="time-sub-label">Start</div>
                                        <input type="time" id="startTime" required>
                                    </div>
                                    <div class="time-range-sep">→</div>
                                    <div>
                                        <div class="time-sub-label">End</div>
                                        <input type="time" id="endTime" required>
                                    </div>
                                </div>
                                <small class="field-error" id="timeError"></small>
                            </div>

                            <div class="field-group">
                                <label>Number of Guests</label>
                                <input type="number" id="guestCount" placeholder="0" min="1" max="500">
                            </div>
                        </div>
                    </div>

                    <div class="special-request-section">
                        <div class="section-title">Special Request</div>
                        <div class="field-group">
                            <textarea id="message" placeholder="Any dietary restrictions, allergies, or special instructions" maxlength="500"></textarea>
                        </div>
                    </div>

                    <div class="btn-row">
                        <button type="submit" class="btn-continue">Continue</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="page-footer">
        <div class="footer-brand">
            <h4>DE LAS ARMAS</h4>
            <p>Catering & Event Services</p>
        </div>
        <div class="footer-links">
            <div class="v-line"></div>
            <a href="terms_&_conditions.html">Terms</a>
            <a href="privacy_policy.html">Privacy</a>
        </div>
    </footer>
    <script>
        const API_URL = 'https://delasarmascatering.onrender.com';

        /* ── Booked slots cache (refreshed on date change) ──────────────── */
        let bookedSlots = [];

        /* ── Set minimum date to 3 days from today ──────────────────────── */
        (function setMinDate() {
            const minDate = new Date();
            minDate.setDate(minDate.getDate() + 3);
            document.getElementById('eventDate').min = minDate.toISOString().split('T')[0];
        })();

        /* ── Auto-fill from logged-in user ─────────────────────────────── */
        (function prefillFromUser() {
            try {
                const raw = localStorage.getItem('user');
                if (!raw) return;
                const user = JSON.parse(raw);

                const fullName =
                    user.fullName   ||
                    user.full_name  ||
                    user.name       ||
                    ((user.firstName || user.first_name || '') + ' ' +
                    (user.lastName  || user.last_name  || '')).trim() ||
                    user.username   || '';

                const email = user.email || user.emailAddress || user.email_address || '';

                const nameInput  = document.getElementById('fullName');
                const emailInput = document.getElementById('email');

                if (fullName) {
                    nameInput.value = fullName;
                    nameInput.classList.add('valid', 'prefilled');
                    document.getElementById('nameBadge').style.display = 'inline-flex';
                }
                if (email) {
                    emailInput.value = email;
                    emailInput.classList.add('valid', 'prefilled');
                    document.getElementById('emailBadge').style.display = 'inline-flex';
                }

                [nameInput, emailInput].forEach(input => {
                    input.addEventListener('input', () => {
                        input.classList.remove('prefilled');
                        const badge = input.id === 'fullName'
                            ? document.getElementById('nameBadge')
                            : document.getElementById('emailBadge');
                        badge.style.display = 'none';
                    });
                });
            } catch (e) {
                console.warn('[checkout] Could not prefill user data:', e);
            }
        })();

        /* ── Convert "HH:MM" string → total minutes ────────────────────── */
        function timeToMinutes(t) {
            if (!t) return null;
            const [h, m] = t.split(':').map(Number);
            return h * 60 + m;
        }

        /* ── Check if two time ranges overlap ──────────────────────────── */
        function rangesOverlap(newStart, newEnd, bookedStart, bookedEnd) {
            return newStart < bookedEnd && newEnd > bookedStart;
        }

        /* ── Fetch booked time slots for a given date ───────────────────── */
        async function fetchBookedSlots(dateStr) {
            bookedSlots = [];
            if (!dateStr) return;
            try {
                const res  = await fetch(`${API_URL}/api/orders?date=${dateStr}`);
                const data = res.ok ? await res.json() : [];
                bookedSlots = data
                    .filter(o => o.event_start_time && o.event_end_time)
                    .map(o => ({
                        start: o.event_start_time.slice(0, 5),
                        end:   o.event_end_time.slice(0, 5)
                    }));
                console.log('[checkout] Booked slots for', dateStr, bookedSlots);
            } catch (err) {
                console.warn('[checkout] Could not fetch booked slots:', err);
            }
        }

        /* ── Check if current user already has a booking on a date ─────── */
        async function checkUserAlreadyBooked(dateStr) {
            try {
                const userData = localStorage.getItem('user');
                if (!userData) return false;
                const userId = JSON.parse(userData).id;
                const res = await fetch(`${API_URL}/api/user-bookings?userId=${userId}&date=${dateStr}`);
                if (!res.ok) return false;
                const data = await res.json();
                return data.hasBooking === true;
            } catch (err) {
                console.warn('[checkout] Could not check user booking:', err);
                return false;
            }
        }

        /* ── Date validation ────────────────────────────────────────────── */
        const eventDateInput = document.getElementById('eventDate');
        const dateError      = document.getElementById('dateError');

        eventDateInput.addEventListener('change', async function () {
            // Step 1: basic date rules (min 3 days, not empty)
            if (!validateDate()) return;

            const selectedDate = eventDateInput.value;

            // Step 2: check if this user already has a booking on this date
            const alreadyBooked = await checkUserAlreadyBooked(selectedDate);
            if (alreadyBooked) {
                showFieldError(dateError, '⛔ You already have a booking on this date. Each account is limited to one booking per day — please choose a different date.');
                eventDateInput.classList.add('invalid');
                eventDateInput.classList.remove('valid');
                return;
            }

            // Step 3: check if date is fully booked (2 total bookings)
            try {
                const calRes  = await fetch(`${API_URL}/api/calendar-events`);
                const calData = calRes.ok ? await calRes.json() : [];
                const dateRow = calData.find(row => row.order_date === selectedDate);
                const count   = dateRow ? parseInt(dateRow.total_orders) : 0;
                if (count >= 2) {
                    showFieldError(dateError, '⛔ This date is fully booked. Please choose a different date.');
                    eventDateInput.classList.add('invalid');
                    eventDateInput.classList.remove('valid');
                    return;
                }
            } catch (calErr) {
                console.warn('[checkout] Could not check calendar availability:', calErr);
            }

            // All clear — fetch time slots and re-validate time if already filled
            await fetchBookedSlots(selectedDate);
            if (startTimeInput.value && endTimeInput.value) validateTime();
        });

        function validateDate() {
            const val = eventDateInput.value;
            if (!val) {
                showFieldError(dateError, '⚠️ Please select a date');
                eventDateInput.classList.add('invalid'); eventDateInput.classList.remove('valid');
                return false;
            }
            const sel   = new Date(val + 'T00:00:00');
            const today = new Date(); today.setHours(0,0,0,0);
            const min   = new Date(today); min.setDate(today.getDate() + 3);

            if (sel < min) {
                showFieldError(dateError, '⚠️ Must be at least 3 days from today');
                eventDateInput.classList.add('invalid'); eventDateInput.classList.remove('valid');
                return false;
            }
            hideFieldError(dateError);
            eventDateInput.classList.add('valid'); eventDateInput.classList.remove('invalid');
            return true;
        }

        /* ── Time validation ────────────────────────────────────────────── */
        const startTimeInput = document.getElementById('startTime');
        const endTimeInput   = document.getElementById('endTime');
        const timeError      = document.getElementById('timeError');

        [startTimeInput, endTimeInput].forEach(el => el.addEventListener('change', validateTime));

        function validateTime() {
            const start = startTimeInput.value;
            const end   = endTimeInput.value;

            [startTimeInput, endTimeInput].forEach(el => {
                el.classList.remove('valid', 'invalid');
            });

            if (!start || !end) {
                hideFieldError(timeError);
                return true;
            }

            if (end <= start) {
                showFieldError(timeError, '⚠️ End time must be after start time');
                endTimeInput.classList.add('invalid');
                return false;
            }

            const newStart = timeToMinutes(start);
            const newEnd   = timeToMinutes(end);

            for (const slot of bookedSlots) {
                const bStart = timeToMinutes(slot.start);
                const bEnd   = timeToMinutes(slot.end);
                if (rangesOverlap(newStart, newEnd, bStart, bEnd)) {
                    showFieldError(
                        timeError,
                        `⛔ This time overlaps a booking from ${formatTime12h(slot.start)} – ${formatTime12h(slot.end)}. Please choose a different time.`
                    );
                    startTimeInput.classList.add('invalid');
                    endTimeInput.classList.add('invalid');
                    return false;
                }
            }

            hideFieldError(timeError);
            startTimeInput.classList.add('valid');
            endTimeInput.classList.add('valid');
            return true;
        }

        /* ── Phone validation ───────────────────────────────────────────── */
        const contactInput = document.getElementById('contact');
        const phoneError   = document.getElementById('phoneError');
        const phoneIcon    = document.getElementById('phoneIcon');

        contactInput.addEventListener('input', function () {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 11);
            liveValidatePhone();
        });
        contactInput.addEventListener('blur', liveValidatePhone);

        function liveValidatePhone() {
            const val = contactInput.value;
            if (val.length === 0) {
                contactInput.classList.remove('valid', 'invalid');
                phoneIcon.className = 'phone-status-icon';
                hideFieldError(phoneError);
                return null;
            }
            if (val.length < 11) {
                contactInput.classList.add('invalid'); contactInput.classList.remove('valid');
                phoneIcon.className = 'phone-status-icon err';
                phoneIcon.innerHTML = '<i class="fas fa-times-circle"></i>';
                showFieldError(phoneError, `⚠️ Incomplete — ${11 - val.length} digit(s) still needed`);
                return false;
            }
            if (!val.startsWith('09')) {
                contactInput.classList.add('invalid'); contactInput.classList.remove('valid');
                phoneIcon.className = 'phone-status-icon err';
                phoneIcon.innerHTML = '<i class="fas fa-times-circle"></i>';
                showFieldError(phoneError, '⚠️ Must start with 09 (e.g. 09XXXXXXXXX)');
                return false;
            }
            contactInput.classList.add('valid'); contactInput.classList.remove('invalid');
            phoneIcon.className = 'phone-status-icon ok';
            phoneIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
            hideFieldError(phoneError);
            return true;
        }

        function isPhoneValid() {
            const val = contactInput.value;
            return val.length === 11 && val.startsWith('09');
        }

        /* ── Generic live validation ────────────────────────────────────── */
        function liveValidate(input) {
            input.addEventListener('blur', () => {
                if (input.checkValidity() && input.value.trim()) {
                    input.classList.add('valid'); input.classList.remove('invalid');
                } else if (input.value.trim()) {
                    input.classList.add('invalid'); input.classList.remove('valid');
                }
            });
            input.addEventListener('input', () => {
                if (input.classList.contains('invalid') && input.checkValidity()) {
                    input.classList.remove('invalid'); input.classList.add('valid');
                }
            });
        }
        ['fullName', 'email', 'address'].forEach(id => liveValidate(document.getElementById(id)));

        function showFieldError(el, msg) { el.textContent = msg; el.classList.add('show'); }
        function hideFieldError(el)      { el.classList.remove('show'); }

        /* ── Format time value (HH:MM) to 12-hour display string ────────── */
        function formatTime12h(val) {
            if (!val) return '';
            const [h, m]  = val.split(':').map(Number);
            const period  = h >= 12 ? 'PM' : 'AM';
            const hour12  = h % 12 || 12;
            return `${String(hour12).padStart(2,'0')}:${String(m).padStart(2,'0')} ${period}`;
        }

        /* ── Form submit ────────────────────────────────────────────────── */
        document.getElementById('checkoutForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            if (!isPhoneValid())   { liveValidatePhone(); contactInput.focus(); return; }
            if (!validateDate())   { eventDateInput.focus(); return; }

            const eventDate = eventDateInput.value;
            const userData  = localStorage.getItem('user');
            if (!userData) { alert('Please log in first'); window.location.href = 'index.html'; return; }
            const userId = JSON.parse(userData).id;

            // ── Final guard: re-check user booking at submit time ────────
            const alreadyBooked = await checkUserAlreadyBooked(eventDate);
            if (alreadyBooked) {
                showFieldError(dateError, '⛔ You already have a booking on this date. Each account is limited to one booking per day — please choose a different date.');
                eventDateInput.classList.add('invalid'); eventDateInput.classList.remove('valid');
                eventDateInput.focus();
                return;
            }

            // ── Final guard: re-check full date at submit time ───────────
            try {
                const calRes  = await fetch(`${API_URL}/api/calendar-events`);
                const calData = calRes.ok ? await calRes.json() : [];
                const dateRow = calData.find(row => row.order_date === eventDate);
                const count   = dateRow ? parseInt(dateRow.total_orders) : 0;
                if (count >= 2) {
                    showFieldError(dateError, '⛔ This date is fully booked. Please choose a different date.');
                    eventDateInput.classList.add('invalid'); eventDateInput.classList.remove('valid');
                    eventDateInput.focus();
                    return;
                }
            } catch (calErr) {
                console.warn('[checkout] Could not check calendar availability:', calErr);
            }

            // ── Re-fetch slots and validate time ─────────────────────────
            await fetchBookedSlots(eventDate);
            if (!validateTime()) { startTimeInput.focus(); return; }

            function getMenuCartKey() {
                try {
                    const uid = JSON.parse(localStorage.getItem('user'))?.id;
                    return uid ? `menuCart_${uid}` : 'menuCart_guest';
                } catch { return 'menuCart_guest'; }
            }

            const existingSnapshot = JSON.parse(sessionStorage.getItem('orderSnapshot') || '{}');
            const selectedPackage  = existingSnapshot.selectedPackage || JSON.parse(localStorage.getItem('selectedPackage'));
            const addons           = existingSnapshot.addons          || JSON.parse(localStorage.getItem('myCart')) || [];
            const menuItems        = existingSnapshot.menuItems       || JSON.parse(localStorage.getItem(getMenuCartKey())) || [];

            const packageTotal = selectedPackage
                ? parseFloat(selectedPackage.price) * parseInt(selectedPackage.qty || 1)
                : 0;
            const addonsTotal  = addons.reduce((s, a) => s + parseFloat(a.price) * parseInt(a.qty || a.quantity || 1), 0);
            const menuTotal    = menuItems.reduce((s, i) => s + parseFloat(i.price) * parseInt(i.qty || 1), 0);
            const grandTotal   = packageTotal + addonsTotal + menuTotal;

            const startVal  = startTimeInput.value;
            const endVal    = endTimeInput.value;
            const eventTime = startVal && endVal
                ? `${formatTime12h(startVal)} – ${formatTime12h(endVal)}`
                : formatTime12h(startVal) || '';

            const fullName  = document.getElementById('fullName').value.trim();
            const nameParts = fullName.split(' ');

            const customerDetails = {
                fullName,
                firstName: nameParts[0] || '',
                lastName:  nameParts.slice(1).join(' ') || '',
                email:     document.getElementById('email').value.trim(),
                contact:   contactInput.value,
                address:   document.getElementById('address').value.trim()
            };

            const guestCount = document.getElementById('guestCount').value || 0;
            const message    = document.getElementById('message').value;

            localStorage.setItem('customerDetails', JSON.stringify(customerDetails));
            localStorage.setItem('eventDate',        eventDate);
            localStorage.setItem('eventTime',        eventTime);
            localStorage.setItem('eventStartTime',   startVal);
            localStorage.setItem('eventEndTime',     endVal);
            localStorage.setItem('eventAddress',     customerDetails.address);
            localStorage.setItem('contactNumber',    customerDetails.contact);
            localStorage.setItem('guestCount',       guestCount);
            localStorage.setItem('grandTotal',       grandTotal);

            sessionStorage.removeItem('saleSaved');
            sessionStorage.removeItem('saleId');
            sessionStorage.removeItem('reservationId');

            try {
                const response = await fetch(`${API_URL}/api/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId,
                        customerDetails,
                        eventDate,
                        eventTime,
                        eventStartTime: startVal,
                        eventEndTime:   endVal,
                        guestCount,
                        package:     selectedPackage,
                        addons,
                        menuItems,
                        totalAmount: grandTotal,
                        message
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    localStorage.setItem('lastOrderId', result.orderId);

                    const snapshot = {
                        selectedPackage: selectedPackage ? {
                            id:          selectedPackage.id,
                            name:        selectedPackage.name,
                            variant:     selectedPackage.variantName || selectedPackage.variant || '',
                            variantName: selectedPackage.variantName || selectedPackage.variant || '',
                            guestCount:  selectedPackage.guestCount  || 1,
                            price:       parseFloat(selectedPackage.price),
                            qty:         parseInt(selectedPackage.qty || selectedPackage.quantity || 1)
                        } : null,
                        addons: addons.map(a => ({
                            name:  a.name,
                            price: parseFloat(a.price),
                            qty:   parseInt(a.qty || a.quantity || 1)
                        })),
                        menuItems: menuItems.map(i => ({
                            id:       i.id,
                            name:     i.name,
                            price:    parseFloat(i.price),
                            qty:      parseInt(i.qty || 1),
                            variant:  i.variant  || '',
                            category: i.category || ''
                        })),
                        grandTotal,
                        reservationFee:  grandTotal * 0.5,
                        customerDetails,
                        eventDate,
                        eventTime,
                        eventStartTime: startVal,
                        eventEndTime:   endVal,
                        eventAddress: customerDetails.address
                    };

                    sessionStorage.setItem('orderSnapshot', JSON.stringify(snapshot));
                    localStorage.setItem('grandTotal', grandTotal);

                    window.location.href = 'payment.html';
                } else {
                    const error = await response.json();
                    alert('Failed to save order: ' + (error.message || 'Unknown error'));
                }
            } catch (err) {
                console.error('Error:', err);
                alert('Connection Error. Make sure the server is running on port 3001.');
            }
        });
    </script>
</body>
