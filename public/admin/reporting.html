<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporting - De Las Armas</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="icon" href="/assets/img/de las armasa logo 3.png">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/reporting.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-text">
                <h3>DE LAS ARMAS</h3>
                <p>Catering & Event Services</p>
            </div>
        </div>

        <ul class="sidebar-menu">
            <li>
                <a href="dashboard.html"><i class='bx bxs-dashboard'></i> <span>Dashboard</span></a>
            </li>
            <li>
                <a href="appointments.html"><i class='bx bx-calendar'></i> <span>Appointments</span></a>
            </li>
            <li>
                <a href="reviews.html"><i class='bx bxs-bell'></i> <span>Reviews</span></a>
            </li>
            <li class="active">
                <a href="reporting.html"><i class='bx bx-line-chart'></i> <span>Reporting</span></a>
            </li>
            <li>
                <a href="manage.html"><i class='bx bx-folder'></i> <span>Manage</span></a>
            </li>
        </ul>
    </aside>

    <div class="main-content">
        <header>
            <div class="header-actions">
                <div class="profile">
                    <a href="#">
                        <img src="assets/img/Avatar 1.png" alt="Profile">
                    </a>
                </div>
            </div>
        </header>

        <main>
            <div class="reporting-grid">
                
                <div class="card revenue-main-card">
                    <div class="card-top">
                        <div class="title-group">
                            <p class="subtitle">Total Revenue</p>
                            <h1>₱ 0</h1>
                        </div>
                        <div class="controls">
                            <div class="legend">
                                <span class="legend-item"><span class="dot purple"></span> Earned</span>
                                <span class="legend-item"><span class="dot green"></span> Forecasted</span>
                            </div>
                            <select class="time-select">
                                <option value="3">3 months</option>
                                <option value="6">6 months</option>
                                <option value="12">12 months</option>
                                <option value="all">All time</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="chart-container-revenue" id="revenueChartArea">
                        <svg viewBox="0 0 600 220" class="revenue-svg" preserveAspectRatio="none">
                            <defs>
                                <filter id="purpleGlow" x="-20%" y="-20%" width="140%" height="140%">
                                    <feGaussianBlur stdDeviation="4" result="blur" />
                                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                                </filter>
                                <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
                                    <feGaussianBlur stdDeviation="3" result="blur" />
                                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                                </filter>
                            </defs>

                            <g class="grid-lines">
                                <line x1="30" y1="60" x2="600" y2="60" stroke="#f0f0f0" />
                                <line x1="30" y1="120" x2="600" y2="120" stroke="#f0f0f0" />
                                <line x1="30" y1="180" x2="600" y2="180" stroke="#f0f0f0" />
                            </g>
                            
                            <path id="pathGreen" class="wave-green" filter="url(#greenGlow)" stroke="#2ECC71" stroke-width="3" fill="none" />
                            <path id="pathPurple" class="wave-purple" filter="url(#purpleGlow)" stroke="#6C5CE7" stroke-width="3" fill="none" />
                        </svg>

                        <div id="revenueTooltip" class="tooltip-label" style="opacity: 0; position: absolute; pointer-events: none; display: flex; flex-direction: column; align-items: flex-start; gap: 2px;">
                            <span id="tooltipDate" style="font-weight: bold; color: #19276F; margin-bottom: 4px;"></span>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <span class="dot purple" style="width: 8px; height: 8px;"></span>
                                <span>Earned: <b id="earnedValue"></b></span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <span class="dot green" style="width: 8px; height: 8px;"></span>
                                <span>Forecast: <b id="forecastValue"></b></span>
                            </div>
                        </div>

                        <div class="y-labels"><span>100k</span><span>50k</span><span>20k</span></div>
                        <div class="x-labels" id="revenueXLabels"></div>
                    </div>
                </div>

                <div class="card stat-card">
                    <div class="icon-bg purple-light">
                        <img src="assets/img/group.png" alt="Group Icon">
                    </div>
                    <div class="stat-text">
                        <h2>0</h2>
                        <p class="stat-label">Events Serviced</p>
                    </div>
                </div>

                <div class="card stat-card">
                    <div class="icon-bg green-light">
                        <img src="assets/img/peso sign.png" alt="Peso Sign Icon">
                    </div>
                    <div class="stat-text">
                        <h2>₱ 0</h2>
                        <p class="stat-label">Profits Earned</p>
                    </div>
                </div>

                <div class="card donut-card">
                    <div class="card-header-row">
                        <h3>Events Managed</h3>
                    </div>
                    <div class="donut-body">
                        <div class="donut-chart-wrapper">
                            <svg viewBox="0 0 100 100">
                                <defs>
                                    <linearGradient id="purpleDonutGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset=".3%" stop-color="#ffffff"/>
                                        <stop offset="100%" stop-color="#19276F">
                                    </linearGradient>
                                    <linearGradient id="greenDonutGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset=".3%" stop-color="#ffffff"/>
                                        <stop offset="100%" stop-color="#08D110"/>
                                    </linearGradient>
                                </defs>
                                <circle cx="50" cy="50" r="40" fill="none" stroke="#f0f0f0" stroke-width="12" />
                                
                                <circle id="purpleDonutCircle" cx="50" cy="50" r="40" fill="none" 
                                        stroke="url(#purpleDonutGradient)" stroke-width="12" 
                                        stroke-dasharray="0 251.3" stroke-linecap="round" 
                                        transform="rotate(-90 50 50)" 
                                        style="transition: stroke-dasharray 1s ease-in-out;" />
                                
                                <circle cx="50" cy="50" r="23" fill="none" stroke="#E8F5E9" stroke-width="8" />
                                <circle id="greenDonutCircle" cx="50" cy="50" r="23" fill="none" stroke="url(#greenDonutGradient)" stroke-width="8" 
                                        stroke-dasharray="0 144.5" stroke-linecap="round" 
                                        transform="rotate(-90 50 50)" />
                            </svg>
                        </div>
                        <div class="chart-legend-col">
                            <div class="legend-group">
                                <div class="legend-label">
                                    <span class="dot purple"></span> Managed
                                </div>
                                <div id="managedCountLabel" class="legend-number">0</div>
                            </div>
                            <div class="legend-group">
                                <div class="legend-label">
                                    <span class="dot green"></span> Other
                                </div>
                                <div class="legend-number">0</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card bar-card">
                    <div class="card-header-row">
                        <h3>Event Activity</h3>
                    </div>
                    <div class="bar-chart-body">
                        <div class="bar-y-axis">
                            <span>300</span>
                            <span>200</span>
                            <span>100</span>
                            <span>0</span>
                        </div>
                        <div class="bar-grid-container">
                            <div class="bar-lines">
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                            </div>
                            <div class="bar-group">
                                <div class="bar-col">
                                    <div class="bar-wrapper">
                                        <div class="bar" style="height: 60%"></div>
                                    </div>
                                    <span>M</span>
                                </div>
                                <div class="bar-col">
                                    <div class="bar-wrapper">
                                        <div class="bar" style="height: 100%"></div>
                                    </div>
                                    <span>T</span>
                                </div>
                                <div class="bar-col">
                                    <div class="bar-wrapper">
                                        <div class="bar" style="height: 50%"></div>
                                    </div>
                                    <span>W</span>
                                </div>
                                <div class="bar-col">
                                    <div class="bar-wrapper">
                                        <div class="bar" style="height: 75%"></div>
                                    </div>
                                    <span>Th</span>
                                </div>
                                <div class="bar-col">
                                    <div class="bar-wrapper">
                                        <div class="bar" style="height: 85%"></div>
                                    </div>
                                    <span>F</span>
                                </div>
                                <div class="bar-col">
                                    <div class="bar-wrapper">
                                        <div class="bar" style="height: 25%"></div>
                                    </div>
                                    <span>S</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <img src="assets/img/de las armasa logo 3.png" alt="De Las Armas Logo" class="bottom-right-logo">

            </div>
        </main>
    </div>
    <script src="js/reporting-script.js"></script>
</body>
</html>
